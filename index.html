<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3배 레버리지 ETF 알림기</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; color: #fff; font-family: -apple-system, sans-serif; padding: 20px; max-width: 500px; margin: 0 auto; }
  .header { text-align: center; margin-bottom: 18px; }
  .title { font-size: 22px; font-weight: bold; }
  .subtitle { font-size: 13px; color: #aaa; }
  .btn { width: 100%; background: #6366f1; color: #fff; border: none; border-radius: 12px; padding: 14px; font-size: 15px; font-weight: bold; cursor: pointer; margin-bottom: 8px; }
  .btn:disabled { background: #333; cursor: not-allowed; }
  .hint { font-size: 11px; color: #555; text-align: center; margin-bottom: 14px; }
  .card { background: #1e1e1e; border-radius: 14px; padding: 16px; margin-bottom: 12px; border: 1px solid #2a2a2a; }
  .card.ok { border-color: #22c55e; }
  .signal { border-radius: 16px; padding: 20px; margin-bottom: 16px; text-align: center; background: #1e1e1e; border: 2px solid #444; }
  .signal.buy { background: #14532d; border-color: #22c55e; }
  .signal.sell { background: #7f1d1d; border-color: #ef4444; }
  .signal.watch { background: #78350f; border-color: #f59e0b; }
  .signal-emoji { font-size: 44px; }
  .signal-title { font-size: 18px; font-weight: bold; margin-top: 8px; }
  .signal-sub { font-size: 13px; color: #ccc; margin-top: 6px; }
  .row { display: flex; justify-content: space-between; align-items: center; }
  .label { font-size: 12px; color: #aaa; }
  .value { font-size: 30px; font-weight: bold; }
  .value.ok { color: #22c55e; }
  .criterion { font-size: 11px; color: #555; margin-bottom: 4px; text-align: right; }
  .badge { padding: 6px 14px; border-radius: 8px; font-size: 13px; font-weight: bold; background: #333; color: #aaa; display: inline-block; }
  .badge.ok { background: #22c55e; color: #000; }
  .bar-bg { background: #2a2a2a; border-radius: 6px; height: 8px; margin-top: 12px; overflow: hidden; }
  .bar { height: 8px; border-radius: 6px; transition: width 0.8s; }
  .bar-hints { display: flex; justify-content: space-between; font-size: 10px; color: #444; margin-top: 3px; }
  .zones { background: #1a1a2e; border-radius: 14px; padding: 14px; margin-bottom: 16px; }
  .zones-title { font-size: 13px; color: #818cf8; font-weight: bold; margin-bottom: 8px; }
  .zone-row { display: flex; gap: 8px; }
  .zone { flex: 1; text-align: center; border-radius: 8px; padding: 8px 0; background: #2a2a2a; border: 1px solid #333; color: #555; font-size: 12px; font-weight: bold; }
  .zone.hit { background: rgba(34,197,94,0.13); border-color: #22c55e; color: #22c55e; }
  .strategy { background: #1a1a1a; border-radius: 14px; padding: 14px; font-size: 12px; color: #aaa; line-height: 1.9; }
  .strategy-title { color: #818cf8; font-weight: bold; margin-bottom: 4px; }
  .error { background: #2a0a0a; border-radius: 12px; padding: 14px; color: #f87171; text-align: center; margin-bottom: 14px; font-size: 13px; }
  .placeholder { background: #1e1e1e; border-radius: 14px; padding: 28px; text-align: center; color: #aaa; }
  .timestamp { font-size: 11px; color: #555; text-align: center; margin-bottom: 12px; }
  #result { display: none; }
</style>
</head>
<body>

<div class="header">
  <div class="title">📊 3배 레버리지 ETF</div>
  <div class="subtitle">SOXL · TQQQ 매매 타이밍 알림기</div>
</div>

<button class="btn" id="loadBtn" onclick="load()">🔄 지금 조회하기</button>
<div class="hint">출처: CNN Fear &amp; Greed · Yahoo Finance (QQQ)</div>
<div class="timestamp" id="timestamp"></div>
<div class="error" id="error" style="display:none"></div>

<div class="placeholder" id="placeholder">
  <div style="font-size:44px; margin-bottom:10px">📡</div>
  <div style="font-size:14px">버튼을 눌러 실시간 지표를 조회하세요</div>
</div>

<div id="result">
  <div class="signal" id="signal">
    <div class="signal-emoji" id="signalEmoji"></div>
    <div class="signal-title" id="signalTitle"></div>
    <div class="signal-sub" id="signalSub"></div>
  </div>
  <div id="cards"></div>
  <div class="zones">
    <div class="zones-title">💧 분할매수 구간 체크</div>
    <div class="zone-row" id="zones"></div>
    <div style="font-size:11px; color:#555; margin-top:8px">구간 도달 시마다 현금 10%씩 추가 투입</div>
  </div>
</div>

<div class="strategy">
  <div class="strategy-title">📋 매매 전략 요약</div>
  <div>🟢 <b>매수</b>: 공포탐욕≤10 + RSI≤30 + 나스닥 -20% → 현금 50%</div>
  <div>➕ <b>추가</b>: 10% 추가 하락마다 현금 10%씩</div>
  <div>🔴 <b>매도</b>: 전고점 돌파 시 전량 매도</div>
  <div>💤 <b>대기</b>: 현물 1배 ETF + 현금 보유</div>
</div>

<script>
async function load() {
  const btn = document.getElementById("loadBtn");
  const errEl = document.getElementById("error");
  btn.disabled = true;
  btn.textContent = "⏳ 데이터 수집 중...";
  errEl.style.display = "none";

  try {
    const [fgRes, nqRes] = await Promise.all([
      fetch("/api/feargreed").then(r => r.json()),
      fetch("/api/nasdaq").then(r => r.json())
    ]);
    if (fgRes.error) throw new Error("공포탐욕지수: " + fgRes.error);
    if (nqRes.error) throw new Error("나스닥: " + nqRes.error);
    render(fgRes, nqRes);
    document.getElementById("timestamp").textContent =
      "마지막 조회: " + new Date().toLocaleString("ko-KR");
  } catch (e) {
    errEl.textContent = "⚠️ " + e.message;
    errEl.style.display = "block";
  } finally {
    btn.disabled = false;
    btn.textContent = "🔄 지금 조회하기";
  }
}

function render(fg, nq) {
  document.getElementById("placeholder").style.display = "none";
  document.getElementById("result").style.display = "block";

  const fgOk = fg.value <= 10;
  const rsiOk = nq.rsi <= 30;
  const dropOk = nq.dropPct <= -20;
  const allBuy = fgOk && rsiOk && dropOk;
  const anyBuy = fgOk || rsiOk || dropOk;
  const sell = nq.dropPct >= 0;

  const sig = document.getElementById("signal");
  sig.className = "signal " + (allBuy ? "buy" : sell ? "sell" : anyBuy ? "watch" : "");
  document.getElementById("signalEmoji").textContent = allBuy ? "🚨" : sell ? "📤" : anyBuy ? "⚠️" : "😴";
  document.getElementById("signalTitle").textContent =
    allBuy ? "전체 조건 충족 — 매수 타이밍!" :
    sell ? "전고점 돌파 — 매도 타이밍!" :
    anyBuy ? "일부 조건 충족 — 주시 필요" : "조건 미충족 — 현금 대기";
  document.getElementById("signalSub").textContent =
    allBuy ? "남은 현금 50% 투입 검토" :
    sell ? "3배 레버리지 ETF 전량 매도 검토" :
    anyBuy ? "추가 하락 시 현금 10% 준비" : "3개 조건 모두 충족될 때까지 대기";

  const cards = [
    { icon: "😨", title: "공포탐욕지수 (CNN)", sub: fg.label, val: fg.value, ok: fgOk, crit: "≤ 10", pct: fg.value, color: fgOk ? "#22c55e" : "#f59e0b", hints: ["0 극도공포","50 중립","100 탐욕"] },
    { icon: "📉", title: "나스닥100 RSI (14일)", sub: nq.rsi<=30?"과매도":nq.rsi<=50?"하락 모멘텀":"정상/과열", val: nq.rsi, ok: rsiOk, crit: "≤ 30", pct: nq.rsi, color: rsiOk ? "#22c55e" : "#6366f1", hints: ["0 과매도","50 중립","100 과매수"] },
    { icon: "📊", title: "ATH 대비 하락률 (QQQ)", sub: `현재 $${nq.current.toFixed(1)} / ATH $${nq.ath.toFixed(1)}`, val: nq.dropPct + "%", ok: dropOk, crit: "≤ -20%", pct: Math.min(100, Math.max(0, (nq.dropPct+50)/50*100)), color: dropOk ? "#22c55e" : sell ? "#ef4444" : "#f59e0b", hints: ["-50%","-20% 매수선","0% 전고점"] }
  ];

  document.getElementById("cards").innerHTML = cards.map(c => `
    <div class="card ${c.ok?'ok':''}">
      <div class="row">
        <div>
          <div class="label">${c.icon} ${c.title}</div>
          <div class="value ${c.ok?'ok':''}">${c.val}</div>
          <div class="label">${c.sub}</div>
        </div>
        <div>
          <div class="criterion">기준 ${c.crit}</div>
          <div class="badge ${c.ok?'ok':''}">${c.ok?'✅ 충족':'❌ 미충족'}</div>
        </div>
      </div>
      <div class="bar-bg"><div class="bar" style="width:${Math.min(100,Math.max(0,c.pct))}%; background:${c.color}"></div></div>
      <div class="bar-hints">${c.hints.map(h=>`<span>${h}</span>`).join("")}</div>
    </div>`).join("");

  document.getElementById("zones").innerHTML = [-10,-20,-25,-30].map(v =>
    `<div class="zone ${nq.dropPct<=v?'hit':''}">${v}%</div>`).join("");
}
</script>
</body>
</html>
